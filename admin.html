<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - YoTeach</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇫🇷</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header class="main-header scrolled">
        <div class="container">
            <div class="header-content">
                <div class="logo-section"><a href="index.html" class="logo">YoTeach Admin</a></div>
                <div class="header-right-group">
                    <a href="#" id="logoutAdminBtn" class="login-btn">Déconnexion</a>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard admin-dashboard">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <div class="welcome-message"><h1>Tableau de bord administrateur</h1><p id="adminEmail"></p></div>
                <div class="dashboard-actions"><button id="refreshAdminBtn" class="dashboard-action-btn"><i class="fas fa-sync-alt"></i> Actualiser</button></div>
            </div>

            <!-- 1. Prochains cours -->
            <div class="admin-card">
                <div class="card-header"><i class="fas fa-calendar-alt"></i><h2>Prochains cours</h2></div>
                <div id="adminUpcomingLessons"><div class="loading">Chargement...</div></div>
            </div>

            <!-- 2. Forfaits actifs -->
            <div class="admin-card">
                <div class="card-header"><i class="fas fa-boxes"></i><h2>Forfaits actifs</h2></div>
                <div id="activePackagesList"><div class="loading">Chargement...</div></div>
            </div>

            <!-- 3. Revenus (EUR) -->
            <div class="revenue-section admin-card">
                <div class="card-header"><i class="fas fa-chart-line"></i><h2>Revenus (EUR)</h2></div>
                <div class="revenue-controls">
                    <button id="monthSliderPrev" class="slider-btn-small"><i class="fas fa-chevron-left"></i></button>
                    <span id="monthRangeLabel">6 derniers mois</span>
                    <button id="monthSliderNext" class="slider-btn-small"><i class="fas fa-chevron-right"></i></button>
                </div>
                <canvas id="revenueChart" width="800" height="300" style="max-width:100%; height:auto;"></canvas>
            </div>

            <!-- 4. Cours (leçons effectuées + étudiants par mois) -->
            <div class="admin-card">
                <div class="card-header"><i class="fas fa-chalkboard-user"></i><h2>Cours</h2></div>
                <div class="lessons-controls">
                    <button id="lessonsMonthSliderPrev" class="slider-btn-small"><i class="fas fa-chevron-left"></i></button>
                    <span id="lessonsMonthRangeLabel">6 derniers mois</span>
                    <button id="lessonsMonthSliderNext" class="slider-btn-small"><i class="fas fa-chevron-right"></i></button>
                </div>
                <canvas id="lessonsStudentsChart" width="800" height="300" style="max-width:100%; height:auto;"></canvas>
            </div>

            <!-- 5. Étudiants -->
            <div class="admin-card">
                <div class="card-header"><i class="fas fa-users"></i><h2>Étudiants</h2></div>
                <div id="studentsList"><div class="loading">Chargement...</div></div>
            </div>
        </div>
    </div>

    <!-- MODAL AJOUT DOCUMENT -->
    <div id="addDocumentModal" class="modal-overlay">
        <div class="modal-content">
            <h3><i class="fas fa-file-circle-plus"></i> Ajouter un document</h3>
            <div class="modal-body">
                <label>Type de document</label>
                <select id="docTypeSelect">
                    <option value="link">🔗 Lien externe (site, vidéo)</option>
                    <option value="pdf">📄 PDF</option>
                    <option value="image">🖼️ Image</option>
                    <option value="text">📝 Texte / Google Doc</option>
                </select>
                <label>URL du document</label>
                <input type="url" id="docUrlInput" placeholder="https://...">
                <label>Nom du document</label>
                <input type="text" id="docNameInput" placeholder="Nom affiché au survol">
            </div>
            <div class="modal-footer">
                <button id="docCancelBtn" class="modal-btn modal-btn-secondary">Annuler</button>
                <button id="docConfirmBtn" class="modal-btn modal-btn-primary">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="currency.js"></script>
    <script src="booking-cancel.js"></script>
    <!-- Chart.js et plugin datalabels -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
