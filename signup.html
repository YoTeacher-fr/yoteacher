<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="signup.title">Inscription - YoTeach</title>
<!-- Favicon principale (SVG pour navigateurs modernes) -->
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">

<!-- Fallback pour les navigateurs plus anciens (si vous avez un fichier .ico) -->
<link rel="icon" href="/favicon.ico" sizes="any">

<!-- Icône pour écran d'accueil iPhone/iPad -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="signup.css">
<link rel="stylesheet" href="auth-ui.css">
<style>
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .form-input {
            padding-right: 44px;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 1rem;
            padding: 0;
            transition: color 0.2s;
            z-index: 10;
        }
        .toggle-password:hover {
            color: #3c84f6;
        }
    </style>
</head>
<body>
    <!-- Header simplifié sans navlinks -->
    <header class="main-header scrolled">
        <div class="container">
            <div class="header-content">
                <!-- Logo à gauche -->
                <div class="logo-section">
                    <a href="index.html" class="logo">Yoann</a>
                    <div class="flag">🇫🇷</div>
                </div>
                
                <!-- Groupe de droite pour mobile (language, bouton) -->
                <div class="mobile-header-right-group">
                    <!-- Langue mobile -->
                    <div class="language-switcher-mobile" id="languageSwitcherMobile">
                        <span data-i18n="header.language">EN</span>
                    </div>
                    
                    <!-- Bouton Connexion Mobile -->
                    <a href="login.html" class="mobile-login-btn-header" data-i18n="header.login">Connexion</a>
                </div>
                
                <!-- Groupe des boutons de droite - FORCÉ À DROITE -->
                <div class="header-right-group">
                    <!-- Sélecteur de langue uniquement -->
                    <div class="language-switcher" id="languageSwitcherDesktop">
                        <span class="flag">🌐</span>
                        <span data-i18n="header.language">EN</span>
                    </div>
                    
                    <a href="login.html" class="login-btn" data-i18n="header.login">Connexion</a>
                </div>
            </div>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">YoTeach</div>
                    <p class="auth-subtitle" data-i18n="signup.subtitle">Créez votre compte gratuitement</p>
                </div>

                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="fullName" data-i18n="signup.full_name">Nom complet</label>
                        <input type="text" id="fullName" class="form-input" 
                               data-i18n-placeholder="signup.full_name_placeholder" 
                               placeholder="Votre nom et prénom" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email" data-i18n="login.email">Adresse email</label>
                        <input type="email" id="email" class="form-input" 
                               data-i18n-placeholder="login.email_placeholder" 
                               placeholder="votre@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password" data-i18n="login.password">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" 
                                   data-i18n-placeholder="signup.password_placeholder" 
                                   placeholder="Au moins 6 caractères" required minlength="6">
                            <button type="button" class="toggle-password" data-target="password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-hint" data-i18n="signup.password_hint">Minimum 6 caractères</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword" data-i18n="signup.confirm_password">Confirmer le mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input" 
                                   data-i18n-placeholder="signup.confirm_password_placeholder" 
                                   placeholder="Retapez votre mot de passe" required>
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
		<div class="form-group terms-check">
   		 <label class="checkbox-label">
   		     <input type="checkbox" id="acceptTerms" required>
     		     <span class="checkmark"></span>
     		     <span class="checkbox-text">
            <span data-i18n="signup.accept_terms">J'ai lu et j'accepte les</span> 
            <a href="legal.html" target="_blank" class="auth-link" data-i18n="signup.terms_and_policies">Conditions et Politiques</a></span>
    </label>
</div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-user-plus"></i> <span data-i18n="signup.create_account">Créer mon compte</span>
                    </button>

                </form>

                <div class="auth-footer">
                    <p>
                        <span data-i18n="signup.have_account">Déjà un compte ?</span><br /> 
                        <a href="login.html" class="auth-link" data-i18n="login.sign_in">Se connecter</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="supabase.min.js"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="booking.js"></script>
    <script src="common.js"></script>
    <script src="translation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('signupForm');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const errorText = document.getElementById('errorText');
            const successText = document.getElementById('successText');

            // Attendre que l'AuthManager soit initialisé avant de vérifier
            setTimeout(() => {
                if (window.authManager && window.authManager.isAuthenticated && 
                    window.authManager.isAuthenticated()) {
                    console.log('✅ Déjà connecté, redirection vers dashboard');
                    window.location.href = 'dashboard.html';
                }
            }, 1500);
            
            // Inscription
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validation
                if (!fullName || !email || !password || !confirmPassword) {
                    showError('Veuillez remplir tous les champs');
                    return;
                }

                if (password.length < 6) {
                    showError('Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Les mots de passe ne correspondent pas');
                    return;
                }
		const acceptTerms = document.getElementById('acceptTerms');
		if (!acceptTerms.checked) {
		    showError(window.translationManager?.getTranslation('signup.error.accept_terms') || 'Veuillez accepter les conditions d\'utilisation');
		    return;
		}
                // Masquer les messages précédents
                hideMessages();

                // Afficher chargement
                const button = form.querySelector('button');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (window.translationManager?.getTranslation('signup.loading') || 'Création du compte...');
                button.disabled = true;

                try {
                    const result = await window.authManager.signUp(email, password, fullName);
                    
                    if (result.success) {
                        showSuccess(window.translationManager?.getTranslation('signup.success') || "Compte créé avec succès !");
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        showError(result.error);
                        button.innerHTML = originalText;
                        button.disabled = false;
                    }
                } catch (error) {
                    showError('Une erreur est survenue : ' + error.message);
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            });

            // Fonctions d'affichage des messages
            function showError(message) {
                errorText.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }

            function showSuccess(message) {
                successText.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }

            function hideMessages() {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            }
            
                        // Toggle password visibility
            function toggleVisibility(inputId, btn) {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (!input || !icon) return;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }

            document.querySelectorAll('.toggle-password').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const inputId = this.getAttribute('data-target');
                    toggleVisibility(inputId, this);
                });
            });

            // Ajouter le paramètre redirect au lien de connexion
            const loginLink = document.querySelector('.auth-footer a[href="login.html"]');
            if (loginLink) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirectParam = urlParams.get('redirect');
                if (redirectParam) {
                    const currentHref = loginLink.getAttribute('href');
                    const separator = currentHref.includes('?') ? '&' : '?';
                    loginLink.href = `${currentHref}${separator}redirect=${redirectParam}`;
                }
            }
        });
    </script>
</body>
</html>
