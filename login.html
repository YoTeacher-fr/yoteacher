<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login.title">Connexion - YoTeach</title>
<!-- Favicon principale (SVG pour navigateurs modernes) -->
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">

<!-- Fallback pour les navigateurs plus anciens (si vous avez un fichier .ico) -->
<link rel="icon" href="/favicon.ico" sizes="any">

<!-- Icône pour écran d'accueil iPhone/iPad -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="auth-ui.css">
<style>
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .form-input {
            padding-right: 44px;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 1rem;
            padding: 0;
            transition: color 0.2s;
            z-index: 10;
        }
        .toggle-password:hover {
            color: #3c84f6;
        }
    </style>
</head>
<body>
    <header class="main-header scrolled">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <a href="index.html" class="logo">Yoann</a>
                    <div class="flag">🇫🇷</div>
                </div>
                <div class="mobile-header-right-group">
                    <div class="language-switcher-mobile" id="languageSwitcherMobile">
                        <span data-i18n="header.language">EN</span>
                    </div>
                    <button type="button" class="mobile-login-btn-header" data-i18n="header.login">Connexion</button>
                </div>
                <div class="header-right-group">
                    <div class="language-switcher" id="languageSwitcherDesktop">
                        <span class="flag">🌐</span>
                        <span data-i18n="header.language">EN</span>
                    </div>
                    <button type="button" class="login-btn" data-i18n="header.login">Connexion</button>
                </div>
            </div>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">YoTeach</div>
                    <p class="auth-subtitle" data-i18n="login.subtitle">Connectez-vous à votre espace étudiant</p>
                </div>

                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email" data-i18n="login.email">Adresse email</label>
                        <input type="email" id="email" class="form-input" 
                               data-i18n-placeholder="login.email_placeholder" 
                               placeholder="votre@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password" data-i18n="login.password">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" 
                                   data-i18n-placeholder="login.password_placeholder" 
                                   placeholder="Votre mot de passe" required>
                            <button type="button" class="toggle-password" data-target="password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#" id="forgotPasswordLink" data-i18n="login.forgot_password">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i> <span data-i18n="login.sign_in">Se connecter</span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>
                        <span data-i18n="login.no_account">Pas encore de compte ?</span><br /> 
                        <a href="signup.html" class="auth-link" data-i18n="login.sign_up_free">S'inscrire gratuitement</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script src="config.js"></script>
    <script src="supabase.min.js"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="booking.js"></script>
    <script src="common.js"></script>
    <script src="translation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const errorText = document.getElementById('errorText');
            const successText = document.getElementById('successText');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');

            setTimeout(() => {
                if (window.authManager && window.authManager.isAuthenticated && 
                    window.authManager.isAuthenticated()) {
                    console.log('✅ Déjà connecté, redirection vers dashboard');
                    window.location.href = 'dashboard.html';
                }
            }, 1500);

            preventHeaderLoginButtons();

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showError('Veuillez remplir tous les champs');
                    return;
                }

                hideMessages();
                const button = form.querySelector('button');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (window.translationManager?.getTranslation('login.loading') || 'Connexion en cours...');
                button.disabled = true;

                try {
                    const result = await window.authManager.signIn(email, password);
                    if (result.success) {
                        showSuccess(window.translationManager?.getTranslation('login.success') || 'Connexion réussie ! Redirection...');
                        const redirectUrl = result.redirectUrl || 'dashboard.html';
                        setTimeout(() => { window.location.href = redirectUrl; }, 1500);
                    } else {
                        showError(result.error || 'Erreur de connexion');
                        button.innerHTML = originalText;
                        button.disabled = false;
                    }
                } catch (error) {
                    showError('Une erreur est survenue : ' + error.message);
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            });

            // Mot de passe oublié → envoie l'email puis redirige vers reset-password
            forgotPasswordLink.addEventListener('click', async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;

                if (!email) {
                    showError('Veuillez entrer votre adresse email pour réinitialiser votre mot de passe');
                    return;
                }

                hideMessages();
                const btn = forgotPasswordLink;
                const originalText = btn.textContent;
                btn.textContent = 'Envoi en cours…';

                try {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/reset-password.html'
                    });
                    if (error) throw error;

                    // Redirection immédiate vers reset-password avec l'email pré-rempli
                    window.location.href = 'reset-password.html?email=' + encodeURIComponent(email);
                } catch (error) {
                    showError('Erreur : ' + error.message);
                    btn.textContent = originalText;
                }
            });

            function showError(message) {
                errorText.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
            function showSuccess(message) {
                successText.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
            function hideMessages() {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            }

            const signupLink = document.querySelector('.auth-footer a[href="signup.html"]');
            if (signupLink) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirectParam = urlParams.get('redirect');
                if (redirectParam) {
                    const currentHref = signupLink.getAttribute('href');
                    const separator = currentHref.includes('?') ? '&' : '?';
                    signupLink.href = `${currentHref}${separator}redirect=${redirectParam}`;
                }
            }

            function preventHeaderLoginButtons() {
                const loginBtns = document.querySelectorAll('.login-btn, .mobile-login-btn-header');
                loginBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                    });
                });
            }

            // Toggle password visibility
            function toggleVisibility(inputId, btn) {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (!input || !icon) return;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }

            document.querySelectorAll('.toggle-password').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const inputId = this.getAttribute('data-target');
                    toggleVisibility(inputId, this);
                });
            });
        });
    </script>
</body>
</html>
